[platformio]
default_envs = esp32

[env:esp32-s3]
platform      = espressif32
board         = esp32-s3-devkitc-1
framework     = arduino

; Monitor & Upload
monitor_speed = 115200
upload_speed  = 460800

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSE_LittleFS=1

; Libraries
lib_deps =
    WebSockets

; Upload flags
upload_flags = 
    --before=default_reset
    --after=hard_reset


[env:esp32]
platform      = espressif32
board         = esp32doit-devkit-v1
framework     = arduino

monitor_speed = 115200
upload_speed  = 460800

build_flags =
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    WebSockets
    SD
    SPI
