# ── Mosquitto MQTT Broker Configuration ───────────────────────────────────

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# ── Listener 1: MQTT over TLS (port 8883) ─ dành cho ESP32 ───────────────
listener 8883
protocol mqtt

# TLS — dùng cert Let's Encrypt (mount từ certbot volume)
cafile   /mosquitto/certs/chain.pem
certfile /mosquitto/certs/fullchain.pem
keyfile  /mosquitto/certs/privkey.pem
tls_version tlsv1.2

# Yêu cầu xác thực
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Listener 2: MQTT plain (port 1883) ─ nội bộ Docker network ───────────
listener 1883 0.0.0.0
protocol mqtt
# Chỉ cho phép từ internal network (backend Flask)
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Persistence ───────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# Giữ messages khi client offline (QoS 1+)
max_queued_messages 1000
