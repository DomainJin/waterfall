<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waterfall Control Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="home.html" id="nav-home">🏠 Home</a></li>
            <li><a href="control.html" id="nav-control">🎛️ Control</a></li>
            <li><a href="monitor.html" id="nav-monitor">📊 Monitor</a></li>
            <li><a href="config.html" id="nav-config">⚙️ Config</a></li>
        </ul>
    </nav>
    <script>
        // Set active nav based on current page
        const currentPage = window.location.pathname.split('/').pop() || 'home.html';
        const navIds = {
            'home.html': 'nav-home',
            'control.html': 'nav-control', 
            'monitor.html': 'nav-monitor',
            'config.html': 'nav-config'
        };
        const activeId = navIds[currentPage];
        if (activeId) {
            document.getElementById(activeId).classList.add('active');
        }
    </script>
</body>
</html>
